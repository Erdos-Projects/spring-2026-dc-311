# Single flat config — all defaults in one place, no group composition needed.
# Pass with --config-name first_try on any script.

ward:
  name: ward3
  ward_label: "Ward 3"
  raw_311: All_Service_Requests_-_2023.csv
  weather_cache: weather_cache/weather_ward3_2023.csv

features:
  d: 7
  d_p: 14
  l_p: 5
  d_s: 14
  l_s: 0
  d_f: 14
  l_f: 7
  k_AR: 10

model:
  _target_: modeling.models.gbm.LGBMModel
  n_estimators: 300
  learning_rate: 0.05
  num_leaves: 31
  objective: poisson

split:
  random_state: 42
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15

debug:
  verbose: false
  dry_run: false
  inspect: null
